<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Come for India Tour</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Remix Icons -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- External CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg fixed-top w-100">
    <div class="container">

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
            data-bs-target="#navbarSupportedContent">
            <i class="ri-more-2-fill"></i>
        </button>

        <a class="navbar-brand logo" href="{{ url_for('home') }}">
            <div class="logo-text">
                <span class="top">Dream</span>
                <span class="middle">Come</span>
                <span class="bottom">Tours</span>
            </div>
        </a>

        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav mx-auto gap-4">
    <li class="nav-item"><a class="nav-link" href="{{ url_for('home') }}"><i class="fa-solid fa-house"></i>Home</a></li>
    <li class="nav-item"><a class="nav-link" href="{{ url_for('destinations') }}"><i class="fa-solid fa-location-dot"></i>Destinations</a></li>
    <li class="nav-item"><a class="nav-link" href="{{ url_for('stays') }}"><i class="fa-solid fa-hotel"></i>Stays</a></li>
    <li class="nav-item"><a class="nav-link" href="{{ url_for('tours') }}"><i class="fa-solid fa-plane"></i>Tours</a></li>
    <li class="nav-item"><a class="nav-link" href="{{ url_for('contact') }}"><i class="fa-solid fa-star"></i>Review us</a></li>
</ul>
        </div>

        <div class="book_btn">
            <a href="{{ url_for('login') }}"><i class="ri-user-3-line"></i> User</a>
        </div>
    </div>
</nav>
<!-- /Navbar -->


<!-- LOGIN SECTION -->
<div class="login-page">

    <div class="login-box text-center">

        <h3 class="mb-3">Sign in your account</h3>

        <div class="d-flex social gap-3 justify-content-center mb-4">
            <a href="#">LinkedIn</a>
            <a href="#">Google</a>
            <a href="#">Facebook</a>
        </div>

        <span class="text-light">or use your email</span>
<form class="mt-4 d-flex flex-column align-items-center" method="POST">

    <input type="email" name="email" class="form-control mb-3 w-100" placeholder="Email">
<input type="password" name="password" class="form-control mb-3 w-100" placeholder="Password">

    <button type="submit" class="sign_btn">Sign in</button>

</form>

        <div class="backup mt-3">
            <a href="#">Forgot your password?</a>
            <p class="mt-2">First time here? <a href="{{ url_for('register') }}">Create an account</a></p>
        </div>

    </div>

</div>
<!-- /LOGIN SECTION -->


<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
